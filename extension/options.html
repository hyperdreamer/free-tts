<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>free-tts Options</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; max-width: 400px; }
    label { font-size: 13px; font-weight: 600; color: #333; display: block; margin-bottom: 4px; }
    input { padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; box-sizing: border-box; }
    input[type="text"] { width: 100%; }
    input[type="number"] { width: 100px; }
    input[type="color"] { width: 60px; height: 32px; cursor: pointer; padding: 2px; }
    .field { margin-bottom: 16px; }
    .row { display: flex; gap: 12px; align-items: center; }
    .row label { margin-bottom: 0; white-space: nowrap; }
    button { margin-top: 12px; padding: 8px 20px; background: #0071e3; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
    button:hover { background: #0077ed; }
    .status { margin-top: 8px; font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <div class="field">
    <label>Server</label>
    <div class="row">
      <label for="host">Address</label>
      <input type="text" id="host" placeholder="localhost">
      <label for="port">Port</label>
      <input type="number" id="port" min="1" max="65535" placeholder="5000">
    </div>
  </div>
  <div class="field">
    <label for="highlightColor">Highlight Color</label>
    <input type="color" id="highlightColor" value="#fff3cd">
  </div>
  <button id="saveBtn">Save</button>
  <div class="status" id="status"></div>
  <script src="options.js"></script>
</body>
</html>

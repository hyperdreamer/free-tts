<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>free-tts</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <div class="header">
      <span class="title">free-tts</span>
      <span class="status-dot" id="statusDot" title="Server status"></span>
      <a class="options-link" href="#" id="optionsLink" title="Server settings" aria-label="Server settings">⚙</a>
    </div>

    <!-- Server config (toggled by gear icon) -->
    <div class="server-config" id="serverConfig">
      <label>Addr <input type="text" id="hostInput" placeholder="localhost"></label>
      <label>Port <input type="number" id="portInput" min="1" max="65535" placeholder="5000"></label>
      <a class="more-link" id="moreOptionsLink" title="More settings">…</a>
    </div>

    <!-- Voice picker -->
    <div class="voice-row">
      <label class="sr-only" for="voiceSelect">Voice</label>
      <select id="voiceSelect" class="voice-select">
        <option value="">Loading voices...</option>
      </select>
    </div>

    <!-- Text -->
    <label class="sr-only" for="textInput">Text to speak</label>
    <textarea id="textInput" class="text-input" placeholder="Enter text or select text on any page and click the extension icon..."></textarea>

    <!-- Speed -->
    <div class="slider-row">
      <label class="slider-label">Speed <input type="number" id="speedInput" class="speed-input" min="-50" max="200" value="0"> <span id="speedVal">0%</span></label>
      <input type="range" id="speedSlider" min="-50" max="200" value="0" step="1">
    </div>

    <!-- Controls -->
    <div class="controls">
      <button id="speakBtn" class="btn btn-speak">▶ Speak</button>
      <button id="stopBtn" class="btn btn-stop" disabled>■ Stop</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSML TTS Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <!-- Removed the red-box div -->
            <div class="tab active-tab">SSML</div>
            <!-- If you had other tabs, they would go here -->
        </div>
        <div class="content-area">
            <textarea id="ssmlInput" class="ssml-textarea" placeholder="Enter your SSML here..."></textarea>
        </div>
        <div class="bottom-section">
            <button id="downloadBtn" class="download-button">Download</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

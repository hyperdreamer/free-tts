<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSML TTS Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <button class="tab active-tab" data-tab="text" role="tab" aria-selected="true">Text Input</button>
            <button class="tab" data-tab="ssml" role="tab" aria-selected="false">SSML</button>
            <span class="version">v2.0.4</span>
        </div>

        <!-- Text Input Tab -->
        <div class="tab-content active" id="tab-text">
            <div class="text-input-layout">
                <!-- Left: input controls -->
                <div class="text-controls">
                    <!-- Voice Selection Panel -->
                    <div class="voice-panel">
                        <!-- Language + Gender row -->
                        <div class="voice-panel-header">
                            <div class="field-group" style="flex:1">
                                <label class="field-label">Language</label>
                                <select id="languageSelect" class="lang-select">
                                    <option value="">Loading...</option>
                                </select>
                            </div>
                            <div class="field-group" style="flex:1">
                                <label class="field-label">Gender</label>
                                <div class="gender-chips">
                                    <button class="gender-chip active" data-gender="all">All</button>
                                    <button class="gender-chip" data-gender="Male">Male</button>
                                    <button class="gender-chip" data-gender="Female">Female</button>
                                </div>
                            </div>
                        </div>

                        <!-- Voice Search -->
                        <div class="voice-search-wrapper">
                            <input type="text" id="voiceSearch" class="voice-search-input"
                                   placeholder="Search by voice name..." autocomplete="off">
                        </div>

                        <!-- Voice list: Preview | Selected -->
                        <div class="voice-columns">
                            <div class="voice-column voice-column-preview">
                                <div class="voice-column-header">Preview</div>
                                <div class="voice-list" id="voiceList">
                                    <div class="voice-loading">Loading voices...</div>
                                </div>
                            </div>
                            <div class="voice-column voice-column-selected">
                                <div class="voice-column-header">Selected</div>
                                <div class="voice-selected-card" id="voiceSelectedCard">
                                    <div class="voice-selected-name" id="voiceSelectedName">en-US-AvaMultilingualNeural</div>
                                    <div class="voice-selected-meta" id="voiceSelectedMeta">English (United States) · Female</div>
                                    <button class="voice-preview-btn" id="voicePreviewBtn">▶ Preview</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Text Input -->
                    <div class="field-group">
                        <label class="field-label">
                            Input Text
                            <span class="char-count" id="charCount">0 characters</span>
                        </label>
                        <textarea id="textInputArea" class="text-input-area"
                                  placeholder="Enter text to synthesize..."></textarea>
                    </div>

                    <!-- Speed + Pitch row -->
                    <div class="sliders-row">
                        <div class="field-group slider-group">
                            <label class="field-label">
                                Speed
                                <span style="display:inline-flex;align-items:baseline"><input type="number" id="speedInput" class="speed-input" min="-50" max="200" value="0">%</span>
                            </label>
                            <input type="range" id="speedSlider" class="slider" min="-50" max="200" value="0" step="1">
                        </div>
                        <div class="field-group slider-group">
                            <label class="field-label">
                                Pitch
                                <span class="slider-value" id="pitchValue">0 Hz</span>
                            </label>
                            <input type="range" id="pitchSlider" class="slider" min="-50" max="50" value="0" step="1">
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="text-actions">
                        <button id="previewBtn" class="btn-primary">▶ Preview Audio</button>
                        <button id="stopBtn" class="btn-stop-preview" style="display:none">■ Stop</button>
                        <button id="downloadTextBtn" class="btn-secondary">⬇ Download MP3</button>
                    </div>
                </div>

                <!-- Right: SSML preview -->
                <div class="text-results-panel">
                    <div class="panel-content active" id="ssml-preview">
                        <pre id="ssmlPreview" class="ssml-preview"></pre>
                    </div>
                </div>
            </div>
        </div>

        <!-- SSML Tab -->
        <div class="tab-content" id="tab-ssml">
            <div class="content-area">
                <textarea id="ssmlInput" class="ssml-textarea" spellcheck="false"></textarea>
            </div>
            <div class="bottom-section">
                <button id="downloadSsmlBtn" class="btn-primary">Download MP3</button>
            </div>
        </div>
    </div>

    <!-- Hidden audio element for preview playback -->
    <audio id="audioPlayer" class="hidden-audio"></audio>

    <script src="script.js"></script>
</body>
</html>
